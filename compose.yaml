services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: moneyflow
      POSTGRES_USER: moneyflow
      POSTGRES_PASSWORD: moneyflow
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moneyflow -d moneyflow"]
      interval: 2s
      timeout: 2s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
