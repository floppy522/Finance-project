services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data

  api:
    build:
      context: apps/api
    image: moneyflow-api:release-0
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - data
      - app

  web:
    build:
      context: apps/web
    image: moneyflow-web:release-0
    restart: unless-stopped
    networks:
      - app

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    environment:
      MONEYFLOW_DOMAIN: ${MONEYFLOW_DOMAIN:?MONEYFLOW_DOMAIN must be set}
    depends_on:
      - api
      - web
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    networks:
      - app

networks:
  app:
  data:
    internal: true

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  caddy_logs:
